schema_version: 1

context:
  version: "0.5.2"
  python_min: "3.10"

package:
  name: rucio-mcp
  version: ${{ version }}

source:
  url: https://files.pythonhosted.org/packages/c7/b4/79e4d9a7828ad925610da78e4db0472e7c569649a9dd785e6554a982bc62/rucio_mcp-${{ version }}.tar.gz
  sha256: e52b3bfadf34bdc2b23a2241444505f08da34a1a2366f1da4327f5b010a62143

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - rucio-mcp=rucio_mcp.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling >=0.7
    - hatch-vcs
  run:
    - python >=${{ python_min }}
    - rucio-clients >=35.0.0
    - mcp >=1.0
    - prometheus_client >=0.20
    - ca-policy-lcg  # for cert
    - voms # for voms-client
    - voms-lsc # for voms-certs
    - __unix  # see https://github.com/rucio/rucio/issues/8461?reload=1

tests:
  - python:
      imports:
        - rucio_mcp
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - rucio-mcp --help

about:
  summary: An MCP server that exposes Rucio distributed data management operations as tools for LLMs.
  homepage: https://rucio-mcp.readthedocs.io/en/latest/
  repository: https://github.com/kratsg/rucio-mcp
  documentation: https://rucio-mcp.readthedocs.io/en/latest/
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - kratsg
